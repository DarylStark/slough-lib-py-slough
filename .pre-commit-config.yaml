repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.8.4
      hooks:
          - id: ruff
          - id: ruff-format
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.14.0
      hooks:
          - id: mypy
    - repo: https://github.com/commitizen-tools/commitizen
      rev: v4.1.0
      hooks:
          - id: commitizen
